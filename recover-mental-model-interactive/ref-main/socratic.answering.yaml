  questions:
  - id: Q1.2.2
    text: "Who is the intended adopter persona? `dist/install.sh` shows how a repo\
      \ adopts the engine but not who the target is \u2014 platform-engineering teams,\
      \ individual maintainers, an internal AI-platform group? Name the primary adopter\
      \ persona and their maturity level. (Product Owner)"
  - id: Q1.5
    text: "What are the success metrics? The code carries counters (state_transitions,\
      \ total_iterations) but no target defining success. What outcome is the product\
      \ optimizing \u2014 reviewer time saved, defect-escape rate, protocol-authoring\
      \ velocity, adoption count? (Product Owner)"
  - id: Q1.6
    text: What is the segment / priority ordering across use cases? Six protocols
      ship; `code-review` and `recover-mental-model` are flagged as 'the real ones'.
      Which is the flagship, which are experimental, and what is the business priority
      ordering among them? (Product Owner)
  - id: Q4.9
    text: Which quality characteristic has priority? The code shows security, reliability,
      and maintainability mechanisms at once but not their ranking. Give a top-3 ordering
      (needed to justify trade-offs like the deliberate security weakening and to
      fill the Q3.9 Pugh matrices). (Product Owner)
  - id: Q5.5.actionsMinutes
    text: What is the acceptable Actions-minute cost at scale? Each transition is
      a full four-job workflow run and each iteration re-dispatches. What is the acceptable
      cost ceiling per PR / per month at production scale? (Product Owner, Operations)
  - id: Q3.2.rationale
    text: "Why the specific LLM endpoint and model pin? The literal LLM endpoint (a\
      \ Tailscale host) and the `claude-sonnet-4-6` pin are in code, but not the why\
      \ \u2014 why this self-hosted endpoint, why this model tier over alternatives,\
      \ and what the migration plan is. (Architect)"
  - id: Q3.9.PughMatrix
    text: Which alternatives were weighed for the major decisions? Decisions (invert-control,
      recursive unification, firewall-off, one-transition-per-run) are recorded but
      not scored. Which alternatives were actually considered (e.g. long-lived driver
      vs. one-transition-per-run; firewall-with-proxy vs. firewall-off), and how did
      they score against the quality priorities? (Architect)
  - id: Q4.2.target
    text: "Are the timeouts and poll counts targets or safety caps? Agent `timeout-minutes`\
      \ (10/30/45/60) and the 24\xD75s dispatch poll are code-visible. What are the\
      \ intended budgets \u2014 acceptable end-to-end review latency, concurrent-PR\
      \ throughput \u2014 versus mere safety caps? (Architect, Operations)"
  - id: Q4.6.target
    text: What is the threat model and compliance scope? Security mechanisms (trust
      zones, injection-safety) are visible but the target is not. What is the threat
      model (malicious PR author? compromised LLM endpoint? supply-chain of installed
      protocols?), and are any compliance frameworks in scope? (Architect, Operations)
  - id: Q5.4.protocolTrust
    text: What is the trust model for third-party protocols? Checks (sandboxed, zone
      3) and publish hooks (trusted, zone 4) are arbitrary executables the engine
      runs; a publish hook holds the PUBLISH_TOKEN. What is the intended vetting/trust
      model for installing a protocol authored outside the repo? (Architect)
  - id: Q5.3.runbook
    text: Who operates this in production and how are incidents handled? The code
      shows failure modes (failed state, exhausted iterations, CAS conflicts) but
      not the operational owner, incident handling, or the recovery procedure beyond
      re-triggering. Needed for arc42 Ch.7/11 completeness. (Operations)
