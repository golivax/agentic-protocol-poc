name: Lint workflows
on:
  push:
    paths: [".github/workflows/**"]
  pull_request:
    paths: [".github/workflows/**"]
permissions:
  contents: read
jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run actionlint
        # This gate catches GitHub Actions workflow mistakes (the YAML-level errors
        # live-debugging used to catch). actionlint also runs shellcheck on run:
        # blocks; we cap shellcheck at error severity (SHELLCHECK_OPTS) so the gate
        # is not red on pre-existing style/info/warning nits (SC2129/SC2295/SC2034)
        # in the legacy run: blocks — only genuine shell errors fail the build.
        env:
          SHELLCHECK_OPTS: "--severity=error"
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color agentic-engine.yml agentic-orchestrator.yml protocol-join.yml lint.yml agent-factory-tests.yml
        working-directory: .github/workflows

  lock-drift:
    # Catch an agent .md edited without recompiling its .lock.yml. gh-aw also
    # validates the lock hash at runtime (every dispatch fails on a diverged
    # source), but that only fires on the next /review; this shifts the check
    # left to PR time. Every agent in the repo is compiled with a single pinned
    # gh-aw version (v0.77.5, matching .github/aw/actions-lock.json), so the CLI
    # is pinned to it and we recompile EVERY agent uniformly — any drift means a
    # source changed without its lock being regenerated. A gh-aw agent is any
    # workflow .md that has a sibling .lock.yml; we drive the loop off that rather
    # than a `*-agent.md` name glob so the mm-compliance-gate / mm-updater gates
    # (which don't follow the *-agent naming) and any future agent are covered.
    # Hand-written workflows are .yml with no .md, so the glob never touches them.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Install gh-aw CLI (pinned to the repo's compiler version)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin v0.77.5
      - name: Recompile agent workflows and assert no lock drift
        run: |
          for md in .github/workflows/*.md; do
            [ -f "${md%.md}.lock.yml" ] && gh aw compile "$md"
          done
          if ! git diff --exit-code -- '.github/workflows/*.lock.yml'; then
            echo "::error::Stale gh-aw lock(s): an agent .md changed without recompiling. Run 'gh aw compile' locally and commit the regenerated .lock.yml file(s)."
            exit 1
          fi
