name: Grumpy Orchestrator
run-name: "grumpy-review · ${{ github.event.client_payload.instance || format('pr-{0}', github.event.issue.number || github.event.pull_request.number) }}"

on:
  pull_request:
    types: [opened, synchronize, reopened]   # auto-review on open and on every push
  issue_comment:
    types: [created]                          # manual re-trigger via /grumpy
  repository_dispatch:
    types: [protocol-continue]                # internal iterate re-entry

permissions:
  contents: read

concurrency:
  group: grumpy-${{ github.event.client_payload.instance || format('pr-{0}', github.event.issue.number || github.event.pull_request.number) }}
  cancel-in-progress: false

jobs:
  # ── Zone 1: engine-pre. Holds state credentials; never runs agent code. ──
  plan:
    if: >
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/grumpy'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      checks: write
    outputs:
      pr: ${{ steps.ctx.outputs.pr }}
      head_sha: ${{ steps.head.outputs.sha }}
      action: ${{ steps.plan.outputs.action }}
      iteration: ${{ steps.plan.outputs.iteration }}
      feedback: ${{ steps.plan.outputs.feedback }}
      sabotage: ${{ steps.sabotage.outputs.sabotage }}
      instance: ${{ steps.ctx.outputs.instance }}
      command: ${{ steps.ctx.outputs.command }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure yq
        run: |
          command -v yq >/dev/null || {
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          }
      - id: ctx
        env:
          DISPATCH_INSTANCE: ${{ github.event.client_payload.instance }}
        run: |
          case "${{ github.event_name }}" in
            repository_dispatch)
              INSTANCE="$DISPATCH_INSTANCE"
              PR="${INSTANCE#pr-}"
              CMD="continue" ;;
            pull_request)
              PR="${{ github.event.pull_request.number }}"
              INSTANCE="pr-$PR"
              if [ "${{ github.event.action }}" = "synchronize" ]; then CMD="reset"; else CMD="start"; fi ;;
            *)
              PR="${{ github.event.issue.number }}"
              INSTANCE="pr-$PR"
              CMD="start" ;;
          esac
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "instance=$INSTANCE" >> "$GITHUB_OUTPUT"
          echo "command=$CMD" >> "$GITHUB_OUTPUT"
      - id: head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.ctx.outputs.pr }}
        run: |
          SHA=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - id: plan
        env:
          STATE_REMOTE: https://x-access-token:${{ secrets.POC_DISPATCH_TOKEN }}@github.com/${{ github.repository }}.git
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ steps.head.outputs.sha }}
        run: |
          .github/engine/next.sh /tmp/state "${{ steps.ctx.outputs.instance }}" \
            protocols/grumpy/protocol.json "${{ steps.ctx.outputs.command }}" "$HEAD_SHA" > /tmp/action.json
          cat /tmp/action.json
          echo "action=$(jq -r .action /tmp/action.json)" >> "$GITHUB_OUTPUT"
          echo "iteration=$(jq -r .iteration /tmp/action.json)" >> "$GITHUB_OUTPUT"
          { echo "feedback<<GH_EOF"; jq -r .feedback /tmp/action.json; echo "GH_EOF"; } >> "$GITHUB_OUTPUT"
      - id: sabotage
        env:
          GH_TOKEN: ${{ secrets.POC_DISPATCH_TOKEN }}
        run: |
          # PAT (not default GITHUB_TOKEN) avoids "Resource not accessible by
          # integration" on the label read; tolerate any error as not-sabotaged.
          HAS=$(gh api "repos/${{ github.repository }}/issues/${{ steps.ctx.outputs.pr }}/labels" \
            --jq 'any(.[]; .name == "poc:sabotage")' 2>/dev/null || echo false)
          if [ "$HAS" = "true" ] && [ "${{ steps.plan.outputs.iteration }}" = "1" ]; then
            echo "sabotage=true" >> "$GITHUB_OUTPUT"
          else
            echo "sabotage=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Mark review in progress (check run)
        if: steps.plan.outputs.action == 'run-agent'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.head.outputs.sha }}
          ITER: ${{ steps.plan.outputs.iteration }}
        run: |
          source .github/engine/lib.sh
          set_check_run "grumpy-review" "$SHA" in_progress "" "Review in progress" "Reviewing (iteration $ITER); merge is gated until the protocol completes."

  # ── Zone 2: the sandboxed agent, as a separately dispatched gh-aw workflow. ──
  dispatch:
    needs: plan
    if: needs.plan.outputs.action == 'run-agent'
    runs-on: ubuntu-latest
    outputs:
      agent_run_id: ${{ steps.wait.outputs.agent_run_id }}
      agent_ok: ${{ steps.wait.outputs.agent_ok }}
    steps:
      - id: wait
        env:
          GH_TOKEN: ${{ secrets.POC_DISPATCH_TOKEN }}
          PR: ${{ needs.plan.outputs.pr }}
          ITERATION: ${{ needs.plan.outputs.iteration }}
          FEEDBACK: ${{ needs.plan.outputs.feedback }}
          SABOTAGE: ${{ needs.plan.outputs.sabotage }}
          REPO: ${{ github.repository }}
        run: |
          CTX=$(jq -nc \
            --arg pr "$PR" \
            --arg iteration "$ITERATION" \
            --arg feedback "$FEEDBACK" \
            --argjson sabotage "$SABOTAGE" \
            '{pr: $pr, iteration: $iteration, feedback: $feedback, sabotage: $sabotage}')
          T0=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run grumpy-agent.lock.yml --repo "$REPO" -f aw_context="$CTX"
          # PoC simplification (documented limitation): resolve the agent run as the
          # newest workflow_dispatch run since T0. Safe only when one PR is reviewed at
          # a time — the agent workflow's concurrency group is global, so concurrent PRs
          # could misattribute runs. A production fix stamps a correlation id into the
          # evidence artifact and matches on it.
          RID=""
          for i in $(seq 1 24); do
            sleep 5
            RID=$(gh run list --repo "$REPO" \
              --workflow grumpy-agent.lock.yml --event workflow_dispatch \
              --created ">=$T0" --json databaseId --jq '.[0].databaseId // empty')
            [ -n "$RID" ] && break
          done
          [ -n "$RID" ] || { echo "agent run never appeared"; exit 1; }
          echo "agent_run_id=$RID" >> "$GITHUB_OUTPUT"
          if gh run watch "$RID" --repo "$REPO" --exit-status; then
            echo "agent_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "agent_ok=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Zone 3: checks. No secrets beyond default read token; independent ground truth. ──
  checks:
    needs: [plan, dispatch]
    if: always() && needs.dispatch.result != 'skipped' && needs.plan.outputs.action == 'run-agent'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: read
    outputs:
      verdicts: ${{ steps.run.outputs.verdicts }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download evidence artifact
        run: |
          mkdir -p /tmp/agent
          if [ -n "${{ needs.dispatch.outputs.agent_run_id }}" ]; then
            gh run download "${{ needs.dispatch.outputs.agent_run_id }}" \
              --repo "${{ github.repository }}" -n evidence -D /tmp/agent \
              || echo "no evidence artifact"
          fi
      - name: Fetch independent ground truth
        run: |
          gh pr diff "${{ needs.plan.outputs.pr }}" --repo "${{ github.repository }}" > /tmp/diff.txt
          gh pr diff "${{ needs.plan.outputs.pr }}" --repo "${{ github.repository }}" --name-only > /tmp/files.txt
      - id: run
        env:
          RID: ${{ needs.dispatch.outputs.agent_run_id }}
          OK: ${{ needs.dispatch.outputs.agent_ok }}
        run: |
          # The check LIST comes from protocol.json (not hardcoded here); run-checks.sh
          # resolves each check to an executable in any language and aggregates verdicts.
          EV=/tmp/agent/evidence.json
          if [ ! -f "$EV" ]; then
            echo "WARNING: no evidence artifact (agent run $RID, ok=$OK); checks will report it" >&2
            echo '{}' > "$EV"
          fi
          VERDICTS=$(.github/engine/run-checks.sh \
            protocols/grumpy/protocol.json review "$EV" /tmp/diff.txt /tmp/files.txt)
          jq . <<<"$VERDICTS"
          echo "verdicts=$VERDICTS" >> "$GITHUB_OUTPUT"

  # ── Zone 4: engine-post. Reads check verdicts only; sole writer of state. ──
  advance:
    needs: [plan, dispatch, checks]
    if: always() && needs.plan.outputs.action == 'run-agent' && needs.dispatch.result != 'skipped' && (needs.checks.result == 'success' || needs.checks.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Ensure yq
        run: |
          command -v yq >/dev/null || {
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          }
      - name: Re-download evidence (for publication only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/agent
          if [ -n "${{ needs.dispatch.outputs.agent_run_id }}" ]; then
            gh run download "${{ needs.dispatch.outputs.agent_run_id }}" \
              --repo "${{ github.repository }}" -n evidence -D /tmp/agent || true
          fi
          [ -f /tmp/agent/evidence.json ] || echo '{"files":[]}' > /tmp/agent/evidence.json
      - name: Advance
        env:
          STATE_REMOTE: https://x-access-token:${{ secrets.POC_DISPATCH_TOKEN }}@github.com/${{ github.repository }}.git
          GH_TOKEN: ${{ secrets.POC_DISPATCH_TOKEN }}
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_RUN_ID: ${{ needs.dispatch.outputs.agent_run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR: ${{ needs.plan.outputs.pr }}
          PR_HEAD_SHA: ${{ needs.plan.outputs.head_sha }}
          VERDICTS: ${{ needs.checks.outputs.verdicts }}
        run: |
          if [ -z "$VERDICTS" ]; then
            VERDICTS='{"results":[{"check":"checks-job","pass":false,"feedback":"checks job did not complete; treating as failed iteration"}]}'
          fi
          printf '%s' "$VERDICTS" > /tmp/verdicts.json
          jq . /tmp/verdicts.json
          .github/engine/advance.sh /tmp/state "${{ needs.plan.outputs.instance }}" \
            protocols/grumpy/protocol.json /tmp/verdicts.json /tmp/agent/evidence.json
