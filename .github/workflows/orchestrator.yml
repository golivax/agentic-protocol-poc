name: Grumpy Orchestrator
# run-name and concurrency.group below must use the SAME instance expression so a
# repository_dispatch (client_payload.instance="pr-N") and a pull_request (number N)
# label the same logical instance. GHA has no top-level anchors — keep them in sync.
run-name: "multi-grumpy · ${{ github.event.client_payload.instance || format('pr-{0}', github.event.issue.number || github.event.pull_request.number) }}"

on:
  pull_request:
    types: [opened, synchronize, reopened]   # auto-review on open and on every push
  issue_comment:
    types: [created]                          # manual re-trigger via /grumpy
  repository_dispatch:
    types: [protocol-continue]                # internal iterate re-entry

permissions:
  contents: read

concurrency:
  # Scope the group by BRANCH (empty for pull_request/issue_comment) as well as instance:
  # a fan-out iterates each branch via its own protocol-continue, and an instance-only
  # group serialized them — so when two branch continues queued, GitHub evicted the
  # pending one, stranding that branch mid-review (join then never reaches all-terminal).
  # Per-branch groups let grumpy and security iterate independently. Branch state files
  # are disjoint, so cas_push's rebase-once still applies cleanly under concurrency.
  group: grumpy-${{ github.event.client_payload.instance || format('pr-{0}', github.event.issue.number || github.event.pull_request.number) }}-${{ github.event.client_payload.branch }}
  cancel-in-progress: false

jobs:
  # ── Zone 1: engine-pre. Holds state credentials; never runs agent code. ──
  plan:
    if: >
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/grumpy'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write   # POSTing a PR's issue-comment (the shared status comment) needs pull-requests:write, not just issues:write
      checks: write
    outputs:
      pr: ${{ steps.ctx.outputs.pr }}
      head_sha: ${{ steps.head.outputs.sha }}
      action: ${{ steps.plan.outputs.action }}
      iteration: ${{ steps.plan.outputs.iteration }}
      feedback: ${{ steps.plan.outputs.feedback }}
      sabotage: ${{ steps.sabotage.outputs.sabotage }}
      instance: ${{ steps.ctx.outputs.instance }}
      command: ${{ steps.ctx.outputs.command }}
      branches: ${{ steps.plan.outputs.branches }}
      branch: ${{ steps.ctx.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure yq
        run: |
          command -v yq >/dev/null || {
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          }
      - id: ctx
        env:
          DISPATCH_INSTANCE: ${{ github.event.client_payload.instance }}
          DISPATCH_BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          # Map the GitHub event → engine command (see next.sh header for the contract):
          #   start = fresh review, reset = force-restart on a new commit, continue = iterate loop.
          # DISPATCH_INSTANCE / DISPATCH_BRANCH are read via env (not inline) to avoid
          # shell injection from the payload. The branch is only present on a
          # repository_dispatch (protocol-continue) — empty for pull_request/issue_comment,
          # which routes next.sh down the unbranched fan-out-planning path.
          BRANCH=""
          case "${{ github.event_name }}" in
            repository_dispatch)
              INSTANCE="$DISPATCH_INSTANCE"
              [ -n "$INSTANCE" ] || { echo "[ctx] repository_dispatch with empty instance" >&2; exit 1; }
              PR="${INSTANCE#pr-}"
              BRANCH="$DISPATCH_BRANCH"
              CMD="continue" ;;
            pull_request)
              PR="${{ github.event.pull_request.number }}"
              INSTANCE="pr-$PR"
              if [ "${{ github.event.action }}" = "synchronize" ]; then CMD="reset"; else CMD="start"; fi ;;
            *)
              PR="${{ github.event.issue.number }}"
              INSTANCE="pr-$PR"
              CMD="start" ;;
          esac
          echo "pr=$PR" >> "$GITHUB_OUTPUT"
          echo "instance=$INSTANCE" >> "$GITHUB_OUTPUT"
          echo "command=$CMD" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
      - id: head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.ctx.outputs.pr }}
        run: |
          SHA=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - id: plan
        env:
          STATE_REMOTE: https://x-access-token:${{ secrets.POC_DISPATCH_TOKEN }}@github.com/${{ github.repository }}.git
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ steps.head.outputs.sha }}
        run: |
          # BRANCH (empty for pull_request/issue_comment) routes next.sh: empty →
          # unbranched fan-out planning (run-fanout); set → branched continue for that
          # one branch (run-agent or halt). An UNBRANCHED continue on a fan-out protocol
          # errors (exit 2) — but pull_request/issue_comment never emit "continue".
          BRANCH="${{ steps.ctx.outputs.branch }}" .github/agent-factory/engine/next.py /tmp/state "${{ steps.ctx.outputs.instance }}" \
            .github/agent-factory/protocols/multi-grumpy/protocol.json "${{ steps.ctx.outputs.command }}" "$HEAD_SHA" > /tmp/action.json
          cat /tmp/action.json
          ACTION=$(jq -r .action /tmp/action.json)
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "iteration=$(jq -r .iteration /tmp/action.json)" >> "$GITHUB_OUTPUT"
          { echo "feedback<<GH_EOF"; jq -r .feedback /tmp/action.json; echo "GH_EOF"; } >> "$GITHUB_OUTPUT"
          # Branch matrix: run-fanout → all branch ids; branched continue run-agent →
          # [that branch]; halt/other → []. Downstream jobs gate on branches != '[]'.
          if [ "$ACTION" = "run-fanout" ]; then
            BRANCHES=$(jq -c '[.branches[].id]' /tmp/action.json)
          elif [ "$ACTION" = "run-agent" ] && [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            BRANCHES=$(jq -cn --arg b "${{ steps.ctx.outputs.branch }}" '[$b]')
          else
            BRANCHES='[]'
          fi
          echo "branches=$BRANCHES" >> "$GITHUB_OUTPUT"
      - id: sabotage
        env:
          GH_TOKEN: ${{ secrets.POC_DISPATCH_TOKEN }}
        run: |
          # PAT (not default GITHUB_TOKEN) avoids "Resource not accessible by
          # integration" on the label read; tolerate any error as not-sabotaged.
          HAS=$(gh api "repos/${{ github.repository }}/issues/${{ steps.ctx.outputs.pr }}/labels" \
            --jq 'any(.[]; .name == "poc:sabotage")' 2>/dev/null || echo false)
          if [ "$HAS" = "true" ]; then
            echo "sabotage=true" >> "$GITHUB_OUTPUT"
          else
            echo "sabotage=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Mark review in progress (check run)
        if: steps.plan.outputs.branches != '[]'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.head.outputs.sha }}
          ITER: ${{ steps.plan.outputs.iteration }}
        run: |
          source .github/agent-factory/engine/lib.sh
          # Mark the AGGREGATE "multi-grumpy" check-run in_progress — this is the
          # required gating check. It stays in_progress until join.sh completes it
          # (the per-branch advance writes "multi-grumpy/<branch>" sub-runs, not this).
          set_check_run "multi-grumpy" "$SHA" in_progress "" "Review in progress" "Reviewing (iteration $ITER); merge is gated until the protocol completes."

      - name: Ensure shared status comment
        if: steps.plan.outputs.action == 'run-fanout'
        env:
          STATE_REMOTE: https://x-access-token:${{ secrets.POC_DISPATCH_TOKEN }}@github.com/${{ github.repository }}.git
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR: ${{ steps.ctx.outputs.pr }}
          INSTANCE: ${{ steps.ctx.outputs.instance }}
        run: |
          source .github/agent-factory/engine/lib.sh
          # next.sh already seeded + pushed _instance.yaml into /tmp/state at fan-out
          # start. Create the ONE shared progress comment up front (create-once:
          # skip if an id is already recorded), so the two parallel branch advances
          # and the join only ever PATCH it. Idempotent across re-runs of this job.
          INF=$(instance_file /tmp/state multi-grumpy "$INSTANCE")
          CID=$(yq -r '.status_comment_id // ""' "$INF" 2>/dev/null || echo "")
          if [ -z "$CID" ]; then
            BODY=$(render_fanout_status_body /tmp/state multi-grumpy "$INSTANCE" .github/agent-factory/protocols/multi-grumpy/protocol.json)
            upsert_status_comment "$INF" "$PR" "$BODY"
            cas_push /tmp/state "$INSTANCE: ensure shared status comment"
          fi

  # ── Zone 2: the sandboxed agents, fanned out one matrix leg per branch. ──
  # Matrix jobs share ONE job-level outputs map (last leg clobbers), so per-branch
  # data (agent run id, agent ok) is passed via a branch-named ARTIFACT instead —
  # see runmeta-<branch> below. No job-level outputs here.
  dispatch:
    needs: plan
    if: ${{ needs.plan.outputs.branches != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(needs.plan.outputs.branches) }}
    steps:
      - uses: actions/checkout@v4
      - id: wait
        env:
          GH_TOKEN: ${{ secrets.POC_DISPATCH_TOKEN }}
          PR: ${{ needs.plan.outputs.pr }}
          ITERATION: ${{ needs.plan.outputs.iteration }}
          FEEDBACK: ${{ needs.plan.outputs.feedback }}
          SABOTAGE: ${{ needs.plan.outputs.sabotage }}
          REPO: ${{ github.repository }}
        run: |
          # pr/iteration/feedback/sabotage come from plan: for run-fanout they are
          # uniformly iteration 1 / feedback "" (correct for a fresh branch); for a
          # branched continue there is exactly one matrix leg, so they are that
          # branch's values.
          source .github/agent-factory/engine/lib.sh
          # Correlation id: globally unique per dispatch — the orchestrator run id
          # is unique, run_attempt disambiguates re-runs, branch disambiguates the
          # two matrix legs. Threaded to the agent via aw_context; the agent stamps
          # it into its run-name → displayTitle (see *-agent.md).
          CID="${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.branch }}"
          CTX=$(jq -nc \
            --arg pr "$PR" \
            --arg iteration "$ITERATION" \
            --arg feedback "$FEEDBACK" \
            --argjson sabotage "$SABOTAGE" \
            --arg cid "$CID" \
            '{pr: $pr, iteration: $iteration, feedback: $feedback, sabotage: $sabotage, cid: $cid}')
          # Each branch dispatches its OWN agent workflow.
          WF="${{ matrix.branch }}-agent.lock.yml"
          mkdir -p /tmp/meta
          T0=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh workflow run "$WF" --repo "$REPO" -f aw_context="$CTX"
          # Resolve the agent run by correlation-id IDENTITY, not newest-since-T0.
          # T0 only bounds the candidate list; the selection is by cid:[<CID>] in
          # the run's displayTitle. An unresolved cid FAILS LOUDLY — never fall back
          # to a recency heuristic, which is exactly the concurrent-PR misattribution
          # this milestone removes.
          RID=""
          for i in $(seq 1 24); do
            sleep 5
            RUNS=$(gh run list --repo "$REPO" \
              --workflow "$WF" --event workflow_dispatch \
              --created ">=$T0" --json databaseId,displayTitle)
            RID=$(match_run_by_cid "$RUNS" "$CID")
            [ -n "$RID" ] && break
          done
          [ -n "$RID" ] || { echo "no agent run matched cid:[$CID] for $WF" >&2; exit 1; }
          # Write run_id as soon as it resolves so downstream can react even on agent
          # failure; agent_ok is written after the watch.
          printf '%s' "$RID" > /tmp/meta/run_id
          if gh run watch "$RID" --repo "$REPO" --exit-status; then
            printf '%s' "true" > /tmp/meta/agent_ok
          else
            printf '%s' "false" > /tmp/meta/agent_ok
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runmeta-${{ matrix.branch }}
          path: /tmp/meta

  # ── Zone 3: checks. No secrets beyond default read token; independent ground truth. ──
  # Matrixed one leg per branch. Per-branch verdicts are passed to advance via the
  # branch-named verdicts-<branch> ARTIFACT (NOT a job output, which would clobber
  # across legs). The agent run id arrives via the runmeta-<branch> artifact.
  checks:
    needs: [plan, dispatch]
    if: always() && needs.plan.outputs.branches != '[]' && needs.dispatch.result != 'skipped'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(needs.plan.outputs.branches) }}
    permissions:
      contents: read
      actions: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download run meta
        uses: actions/download-artifact@v4
        with:
          name: runmeta-${{ matrix.branch }}
          path: /tmp/meta
      - id: meta
        run: |
          RID=$(cat /tmp/meta/run_id 2>/dev/null || echo "")
          OK=$(cat /tmp/meta/agent_ok 2>/dev/null || echo "")
          echo "rid=$RID" >> "$GITHUB_OUTPUT"
          echo "ok=$OK" >> "$GITHUB_OUTPUT"
      - name: Download evidence artifact
        run: |
          mkdir -p /tmp/agent
          if [ -n "${{ steps.meta.outputs.rid }}" ]; then
            gh run download "${{ steps.meta.outputs.rid }}" \
              --repo "${{ github.repository }}" -n evidence -D /tmp/agent \
              || echo "no evidence artifact"
          fi
      - name: Fetch independent ground truth
        run: |
          gh pr diff "${{ needs.plan.outputs.pr }}" --repo "${{ github.repository }}" > /tmp/diff.txt
          gh pr diff "${{ needs.plan.outputs.pr }}" --repo "${{ github.repository }}" --name-only > /tmp/files.txt
      - name: Run checks
        env:
          RID: ${{ steps.meta.outputs.rid }}
          OK: ${{ steps.meta.outputs.ok }}
        run: |
          # The check LIST comes from protocol.json (not hardcoded here); run-checks.sh
          # resolves each check to an executable in any language and aggregates verdicts.
          # BRANCH selects this branch's check list from the fan-out state.
          EV=/tmp/agent/evidence.json
          if [ ! -f "$EV" ]; then
            echo "WARNING: no evidence artifact (agent run $RID, ok=$OK); checks will report it" >&2
            echo '{}' > "$EV"
          fi
          VERDICTS=$(BRANCH=${{ matrix.branch }} .github/agent-factory/engine/run-checks.sh \
            .github/agent-factory/protocols/multi-grumpy/protocol.json review "$EV" /tmp/diff.txt /tmp/files.txt)
          jq . <<<"$VERDICTS"
          mkdir -p /tmp/verdicts
          printf '%s' "$VERDICTS" > /tmp/verdicts/verdicts.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verdicts-${{ matrix.branch }}
          path: /tmp/verdicts

  # ── Zone 4: engine-post. Reads check verdicts only; sole writer of state. ──
  # Matrixed one leg per branch. Each leg reads its OWN run id + verdicts from the
  # branch-named artifacts (runmeta-<branch>, verdicts-<branch>) — never from a
  # needs-output, which would clobber across legs. advance.sh runs WITH BRANCH so it
  # writes per-branch state + the multi-grumpy/<branch> sub check-run, and fires
  # protocol-join (terminal) or protocol-continue with branch=<branch> (iterate).
  advance:
    needs: [plan, dispatch, checks]
    if: always() && needs.plan.outputs.branches != '[]' && needs.dispatch.result != 'skipped' && (needs.checks.result == 'success' || needs.checks.result == 'failure')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJSON(needs.plan.outputs.branches) }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - name: Ensure yq
        run: |
          command -v yq >/dev/null || {
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          }
      - name: Download run meta
        uses: actions/download-artifact@v4
        with:
          name: runmeta-${{ matrix.branch }}
          path: /tmp/meta
      - name: Download verdicts
        uses: actions/download-artifact@v4
        with:
          name: verdicts-${{ matrix.branch }}
          path: /tmp/verdicts
      - name: Re-download evidence (for publication only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/agent
          RID=$(cat /tmp/meta/run_id 2>/dev/null || echo "")
          if [ -n "$RID" ]; then
            gh run download "$RID" \
              --repo "${{ github.repository }}" -n evidence -D /tmp/agent || true
          fi
          [ -f /tmp/agent/evidence.json ] || echo '{"files":[]}' > /tmp/agent/evidence.json
      - name: Advance
        env:
          STATE_REMOTE: https://x-access-token:${{ secrets.POC_DISPATCH_TOKEN }}@github.com/${{ github.repository }}.git
          GH_TOKEN: ${{ secrets.POC_DISPATCH_TOKEN }}
          PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR: ${{ needs.plan.outputs.pr }}
          PR_HEAD_SHA: ${{ needs.plan.outputs.head_sha }}
        run: |
          # AGENT_RUN_ID comes from the downloaded runmeta file (env: blocks can't read
          # a downloaded file), so export it here before calling advance.sh.
          export AGENT_RUN_ID=$(cat /tmp/meta/run_id 2>/dev/null || echo "")
          VERDICTS=$(cat /tmp/verdicts/verdicts.json 2>/dev/null || echo "")
          if [ -z "$VERDICTS" ]; then
            VERDICTS='{"results":[{"check":"checks-job","pass":false,"feedback":"checks job did not complete; treating as failed iteration"}]}'
          fi
          printf '%s' "$VERDICTS" > /tmp/verdicts.json
          jq . /tmp/verdicts.json
          BRANCH=${{ matrix.branch }} .github/agent-factory/engine/advance.sh /tmp/state "${{ needs.plan.outputs.instance }}" \
            .github/agent-factory/protocols/multi-grumpy/protocol.json /tmp/verdicts.json /tmp/agent/evidence.json
