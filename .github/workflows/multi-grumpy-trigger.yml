name: multi-grumpy
# Thin per-protocol trigger shim. Declares the real `on:` triggers (which a
# reusable workflow_call workflow cannot declare itself) and hands off to the
# generic engine. The engine derives the command from the event via this
# protocol's `triggers` block; the only protocol-specific value here is the path.
#
# run-name + concurrency live HERE (the caller), not in the reusable engine:
# both must use the SAME instance expression so a repository_dispatch
# (client_payload.instance="pr-N") and a pull_request (number N) label the same
# logical instance — GHA has no top-level anchors, keep them in sync.
run-name: "multi-grumpy · ${{ github.event.client_payload.instance || format('pr-{0}', github.event.issue.number || github.event.pull_request.number) }}"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  repository_dispatch:
    types: [protocol-continue, protocol-advance]   # protocol-join is owned by protocol-join.yml

# The calling job's permissions are the CEILING for the reusable engine: a
# called workflow cannot request more than the caller grants (else GitHub fails
# the run at startup). So grant the UNION of what the engine's jobs need —
# plan/advance: issues+pull-requests+checks write; checks: actions+pull-requests
# read. The engine's per-job `permissions:` then scope down within this ceiling.
# (State writes use the POC_DISPATCH_TOKEN PAT, not GITHUB_TOKEN, so contents
# stays read.)
permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write
  actions: read

concurrency:
  # Scope by instance AND branch (empty for entry events / agent phases): a fan-out
  # iterates each branch via its own protocol-continue; an instance-only group would
  # let one queued branch-continue evict another, stranding a branch mid-review.
  group: multi-grumpy-${{ github.event.client_payload.instance || format('pr-{0}', github.event.issue.number || github.event.pull_request.number) }}-${{ github.event.client_payload.branch }}
  cancel-in-progress: false

jobs:
  engine:
    uses: ./.github/workflows/agentic-engine.yml
    with:
      protocol: .github/agent-factory/protocols/multi-grumpy/protocol.json
    secrets: inherit
