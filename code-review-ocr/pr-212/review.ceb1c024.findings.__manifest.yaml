    existing_code: 'def load_config(path, defaults={}):'
    side: RIGHT
    line: 4
    comment: 'Mutable default argument `defaults={}`: Python creates this dict once
      at function-definition time and reuses it across every call that omits the argument.
      If a caller ever mutates the returned value or passes a reference back, the
      shared default is contaminated for all subsequent calls. Use `defaults=None`
      and initialize with `if defaults is None: defaults = {}` inside the body.'
