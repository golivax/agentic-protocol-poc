    existing_code: 'def load_config(path, defaults={}):'
    side: RIGHT
    line: 4
    comment: 'Mutable default argument: `defaults={}` is evaluated once at function
      definition time and the same dict object is reused across every call that omits
      the argument. If this function is ever extended to write back into `defaults`,
      those writes will silently persist across call sites. The idiomatic fix is `defaults=None`
      with `if defaults is None: defaults = {}` at the top of the body.'
- id: eacac2d8
  key: sample/parse.py:5:1
  item:
    finding_id: sample/parse.py:5:1
    path: sample/parse.py
    existing_code: '    data = json.load(open(path))'
    side: RIGHT
    line: 5
    comment: "File handle leak: `open(path)` is called without a context manager,\
      \ so the file descriptor is never explicitly closed. CPython's reference-counting\
      \ happens to close it promptly in the common case, but this is an implementation\
      \ detail \u2014 PyPy and other runtimes do not guarantee it, and under load\
      \ (e.g., many rapid calls before GC) this can exhaust OS file descriptors. Replace\
      \ with `with open(path) as f: data = json.load(f)`."
